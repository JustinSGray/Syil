name: Build maker macros
on:
  workflow_dispatch:
  push:
    branches: [ main ]
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Generate maker macros
        run: python build_maker_macros.py
      - name: Commit regenerated macros
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add maker_macros
          if git diff --cached --quiet; then
            echo "No macro changes to commit."
          else
            git commit -m "Regenerate maker macros [skip ci]"
            git push
          fi
